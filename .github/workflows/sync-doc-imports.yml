name: Sync Documentation Updates to Production

on:
  pull_request:
    types: [closed]
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-sync-pr:
    name: Create Sync PR to Production
    # Run if manually dispatched, or if an import PR was merged to main
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'automated') &&
       contains(github.event.pull_request.labels.*.name, 'documentation') &&
       contains(github.event.pull_request.labels.*.name, 'import'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.IMPORT_DOCS_TOKEN }}

    steps:
      - name: Validate Automation Token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing IMPORT_DOCS_TOKEN secret." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.IMPORT_DOCS_TOKEN }}

      - name: Check for changes between main and main-dist
        id: diff-check
        run: |
          git fetch origin main-dist
          if git diff --quiet origin/main-dist..origin/main; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes between main and main-dist"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected between main and main-dist"
          fi

      - name: Generate change summary
        if: steps.diff-check.outputs.has_changes == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          DOC_FILES=$(git diff origin/main-dist..origin/main --name-only -- 'src/content/docs/' | sort)
          OTHER_FILES=$(git diff origin/main-dist..origin/main --name-only -- ':!src/content/docs/' | sort)

          {
            echo "## Documentation Sync: Main → Main-Dist"
            echo ""

            if [ -n "$DOC_FILES" ]; then
              echo "### Updated Documentation Areas"
              echo ""

              # Extract unique doc areas and count files per area
              echo "$DOC_FILES" \
                | sed 's|src/content/docs/||' \
                | cut -d'/' -f1-2 \
                | sort -u \
                | while IFS= read -r area; do
                    [ -z "$area" ] && continue
                    COUNT=$(echo "$DOC_FILES" | grep -c "src/content/docs/${area}")
                    PRETTY=$(echo "$area" | sed 's|-| |g; s|/| > |g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)} 1')
                    echo "- **${PRETTY}** (${COUNT} file(s))"
                  done

              echo ""
              echo "<details>"
              echo "<summary>Changed files</summary>"
              echo ""
              echo '```'
              echo "$DOC_FILES"
              echo '```'
              echo "</details>"
            fi

            if [ -n "$OTHER_FILES" ]; then
              OTHER_COUNT=$(echo "$OTHER_FILES" | wc -l | tr -d ' ')
              echo ""
              echo "### Other Changes"
              echo ""
              echo "${OTHER_COUNT} non-documentation file(s) also changed."
              echo ""
              echo "<details>"
              echo "<summary>Changed files</summary>"
              echo ""
              echo '```'
              echo "$OTHER_FILES"
              echo '```'
              echo "</details>"
            fi

            echo ""
            echo "### Review Checklist"
            echo "- [ ] Documentation renders correctly"
            echo "- [ ] No unexpected changes included"
            echo ""
            echo "---"

            if [ "$EVENT_NAME" = "pull_request" ]; then
              echo "*Triggered by merge of PR #${PR_NUMBER}: ${PR_TITLE}*"
            else
              echo "*Triggered manually via workflow dispatch.*"
            fi

            echo "*This PR was automatically generated to sync documentation updates to the production branch.*"
          } > /tmp/pr-body.md

      - name: Check for existing sync PR
        if: steps.diff-check.outputs.has_changes == 'true'
        id: existing-pr
        run: |
          EXISTING_PR=$(gh pr list --base main-dist --head main --state open --json number --jq '.[0].number // empty')
          echo "pr_number=${EXISTING_PR}" >> $GITHUB_OUTPUT

      - name: Update existing sync PR
        if: steps.diff-check.outputs.has_changes == 'true' && steps.existing-pr.outputs.pr_number != ''
        run: |
          gh pr edit ${{ steps.existing-pr.outputs.pr_number }} --body-file /tmp/pr-body.md
          echo "Updated existing PR #${{ steps.existing-pr.outputs.pr_number }}"

      - name: Create new sync PR
        if: steps.diff-check.outputs.has_changes == 'true' && steps.existing-pr.outputs.pr_number == ''
        id: create-pr
        run: |
          gh pr create \
            --base main-dist \
            --head main \
            --title "Docs: Sync documentation updates to production" \
            --body-file /tmp/pr-body.md \
            --label "documentation" \
            --label "automated" \
            --label "sync"

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.diff-check.outputs.has_changes }}" = "false" ]; then
            echo "No changes to sync between main and main-dist." >> $GITHUB_STEP_SUMMARY
          elif [ -n "${{ steps.existing-pr.outputs.pr_number }}" ]; then
            echo "Updated existing sync PR #${{ steps.existing-pr.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "Created new sync PR from main to main-dist." >> $GITHUB_STEP_SUMMARY
          fi
