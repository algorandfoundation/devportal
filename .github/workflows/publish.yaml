name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - main-dist
      - release/ak-v4
  pull_request:
    branches:
      - main
      - main-dist
      - release/ak-v4
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install D2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s -- --tala

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - name: Install dependencies
        run: pnpm install

      - name: Build the project
        run: pnpm run build
        env:
          PUBLIC_GTM_ID: ${{ secrets.PUBLIC_GTM_ID }}
          PUBLIC_KAPA_INTEGRATION_ID: ${{ secrets.PUBLIC_KAPA_INTEGRATION_ID }}

      - name: Publish to Cloudflare Pages
        id: deploy
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CF_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deployment-url
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = '<!-- cloudflare-preview -->';
            const body = [
              marker,
              `### ☁️ Cloudflare Pages Preview`,
              ``,
              `**Preview URL:** ${process.env.DEPLOY_URL}`,
              `**Branch:** \`${process.env.HEAD_REF}\``,
              `**Commit:** \`${process.env.HEAD_SHA}\``,
            ].join('\n');

            // Find existing comment to update (avoid spam on repeated pushes)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Post to Slack
        if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
        uses: slackapi/slack-github-action@v2.1.1
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_PR_WEBHOOK_URL }}
          payload: |
            {
              "pr_id": "${{ github.event.pull_request.number }}",
              "pr_title": ${{ toJSON(github.event.pull_request.title) }},
              "pr_url": "${{ github.event.pull_request.html_url }}",
              "preview_url": "${{ steps.deploy.outputs.deployment-url }}"
            }
